<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>カロリートラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;color:#e0e0e0;font-family:'Helvetica Neue','Hiragino Sans',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:60px}
input,textarea,button{font-family:inherit}
textarea{resize:none;outline:none}
input{outline:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:16px;padding:24px;width:100%;max-width:400px}
.modal h3{font-size:16px;font-weight:700;color:#e0e0e0;margin-bottom:14px}
.modal-label{font-size:11px;color:#888;margin-bottom:6px;margin-top:12px;display:block}
.modal-input{width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:10px;padding:10px 14px;color:#e0e0e0;font-size:18px;font-family:monospace;text-align:center}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-cancel{flex:1;background:#1a1a2e;border:none;border-radius:10px;padding:12px;color:#666;cursor:pointer;font-family:inherit}
.modal-save{flex:1;background:#f59e0b;border:none;border-radius:10px;padding:12px;color:#000;font-weight:700;cursor:pointer;font-family:inherit}
.header{padding:24px 20px 20px;border-bottom:1px solid #0f0f1c;background:linear-gradient(180deg,#0d0d1a,#07070f)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.date-lbl{font-size:10px;color:#333;letter-spacing:2px;text-transform:uppercase}
.hbtns{display:flex;gap:6px}
.hbtn{background:none;border:1px solid #1a1a2e;border-radius:8px;padding:5px 10px;color:#555;font-size:11px;cursor:pointer}
.gauge-wrap{position:relative;width:176px;height:176px;margin:0 auto}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-cal{font-size:38px;font-weight:700;line-height:1}
.gauge-rem{font-size:12px;font-weight:600;margin-top:6px}
.gauge-sub{font-size:9px;color:#333;margin-top:3px;text-align:center;line-height:1.5}
.macros{margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px}
.macro-lbl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;color:#555}
.pill{height:5px;background:#1a1a2e;border-radius:99px;overflow:hidden}
.pill-fill{height:100%;border-radius:99px;transition:width .5s}
.seg-bar{height:7px;background:#1a1a2e;border-radius:99px;display:flex;overflow:hidden;margin-top:14px}
.seg-legend{display:flex;justify-content:center;gap:12px;margin-top:8px;flex-wrap:wrap}
.seg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.seg-dot{width:6px;height:6px;border-radius:99px;flex-shrink:0}
.rice-box{margin:10px 14px 0;background:linear-gradient(135deg,#0a1a0a,#071207);border:1px solid #10b98128;border-radius:14px;padding:14px;display:none}
.rice-title{font-size:10px;color:#10b981;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.rice-content{font-size:13px;color:#ccc;line-height:1.8}
.tabs{display:flex;gap:8px;padding:12px 14px 0}
.tab-btn{flex:1;border:1px solid #151520;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.tab-btn.active{background:#818cf8;color:#000;border-color:#818cf8}
.tab-btn:not(.active){background:#09090f;color:#555}
.sections{padding:10px 14px 0}
.meal-sec{background:#09090f;border:1px solid #151520;border-radius:16px;overflow:hidden;margin-bottom:10px}
.meal-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.meal-info{flex:1}
.meal-title-row{display:flex;align-items:center;gap:8px}
.meal-name{font-size:14px;font-weight:600;color:#ccc}
.meal-kcal{font-size:13px}
.meal-cnt{font-size:10px;color:#444;background:#151520;border-radius:99px;padding:1px 7px}
.meal-mini{height:3px;background:#151520;border-radius:99px;margin-top:6px;overflow:hidden}
.meal-mini-fill{height:100%;border-radius:99px;transition:width .5s}
.meal-body{border-top:1px solid #151520;padding:12px 14px}
.quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.quick-btn{background:#0f0f1a;border:1px solid #f59e0b40;border-radius:20px;padding:4px 10px;font-size:11px;color:#f59e0b;cursor:pointer;font-family:inherit}
.entry{background:#0c0c1a;border:1px solid #1a1a2e;border-radius:10px;margin-bottom:6px;overflow:hidden}
.entry-hdr{padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.entry-text{flex:1;min-width:0}
.entry-name{font-size:13px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-nums{display:flex;gap:8px;margin-top:2px;font-size:11px;color:#555}
.entry-kcal{color:#f59e0b}
.entry-del{background:none;border:none;color:#2a2a3e;cursor:pointer;font-size:14px;padding:2px 6px}
.fav-star{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px}
.entry-detail{border-top:1px solid #1a1a2e;padding:11px 13px;display:none}
.entry-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #0f0f1c;color:#888}
.entry-row span:last-child{color:#f59e0b}
.advice-box{margin-top:8px;padding:9px 11px;background:#080814;border-radius:8px;font-size:12px;color:#888;line-height:1.7}
.input-box{background:#06060e;border:1px solid #151520;border-radius:11px;padding:10px 12px;margin-top:6px}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.input-hint{font-size:10px;color:#2a2a3e}
.input-btns{display:flex;gap:6px}
.analyze-btn{border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.aete-btn{background:#09090f;border:1px solid #818cf840;border-radius:9px;padding:8px 10px;color:#818cf8;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.err-msg{font-size:11px;color:#f87171;background:#1c0a0a;border-radius:7px;padding:6px 10px;margin-top:6px;line-height:1.5;display:none}
.fav-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fav-chip{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:20px;padding:5px 12px;font-size:12px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:6px}
.fav-chip-kcal{font-size:10px;color:#555}
.fav-chip-del{color:#333;font-size:11px;cursor:pointer;margin-left:2px}
.w-section{padding:10px 14px 0;display:none}
.w-card{background:#09090f;border:1px solid #151520;border-radius:16px;padding:16px;margin-bottom:12px}
.w-card-title{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.w-input{width:100%;background:#06060e;border:1px solid #1a1a2e;border-radius:10px;padding:12px;color:#e0e0e0;font-size:24px;font-family:monospace;text-align:center;margin-bottom:10px}
.w-save-btn{width:100%;background:#818cf8;border:none;border-radius:10px;padding:12px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.w-compare{margin-top:10px;text-align:center;font-size:14px;min-height:18px}
.w-list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0f0f1c;font-size:12px}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- API Key Screen -->

<div id="api-screen" style="position:fixed;inset:0;background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:100">
  <div style="font-size:40px">🔑</div>
  <h2 style="font-size:20px;font-weight:700;color:#e0e0e0;margin:12px 0 8px;text-align:center">APIキーを設定</h2>
  <p style="font-size:13px;color:#555;text-align:center;line-height:1.6;margin-bottom:20px">platform.claude.com で発行した<br>APIキーを貼り付けてください</p>
  <textarea id="api-input" rows="3" style="width:100%;background:#0f0f1a;border:1px solid #1a1a2e;border-radius:12px;padding:12px 16px;color:#ccc;font-size:13px;font-family:monospace;line-height:1.5;outline:none" placeholder="sk-ant-api..."></textarea>
  <button onclick="try{saveApiKey()}catch(e){alert('エラー: '+e.message)}" style="margin-top:14px;width:100%;background:#f59e0b;border:none;border-radius:12px;padding:14px;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">保存して開始</button>
  <p style="font-size:11px;color:#333;margin-top:12px">キーはこの端末のみに保存されます</p>
</div>

<!-- Modals -->

<div id="key-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>APIキーを変更</h3>
    <textarea id="key-modal-input" rows="3" style="width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:10px;padding:10px 14px;color:#ccc;font-size:12px;font-family:monospace;outline:none;resize:none"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('key-modal')">キャンセル</button>
      <button class="modal-save" onclick="saveKeyModal()">保存</button>
    </div>
  </div>
</div>

<div id="goal-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>🎯 目標設定</h3>
    <label class="modal-label">1日の目標カロリー (kcal)</label>
    <input id="goal-cal-input" class="modal-input" type="number" placeholder="1800">
    <label class="modal-label">1日のご飯目標 (g)</label>
    <input id="goal-rice-input" class="modal-input" type="number" placeholder="600">
    <label class="modal-label">体重タブのパスワード（任意）</label>
    <input id="goal-pw-input" class="modal-input" type="password" placeholder="空白でパスワードなし">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('goal-modal')">キャンセル</button>
      <button class="modal-save" onclick="saveGoalModal()">保存</button>
    </div>
  </div>
</div>

<div id="pw-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>🔒 体重データ</h3>
    <p style="font-size:12px;color:#666;margin-bottom:14px">パスワードを入力してください</p>
    <input id="pw-input" type="password" class="modal-input" placeholder="••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="font-size:11px;color:#ef4444;text-align:center;margin-top:8px;display:none">パスワードが違います</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('pw-modal')">キャンセル</button>
      <button class="modal-save" onclick="checkPw()">確認</button>
    </div>
  </div>
</div>

<div id="aete-modal" class="modal-bg" style="display:none">
  <div class="modal" style="max-height:80vh;display:flex;flex-direction:column;padding:0;overflow:hidden">
    <div style="padding:16px 16px 0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3 style="font-size:16px;font-weight:700;color:#e0e0e0">🍱 あえて、を選ぶ</h3>
        <button onclick="closeModal('aete-modal')" style="background:none;border:none;color:#555;font-size:20px;cursor:pointer">✕</button>
      </div>
      <input id="aete-search" type="text" placeholder="メニューを検索…" oninput="renderAeteList()"
        style="width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:8px;padding:9px 12px;color:#e0e0e0;font-size:13px;outline:none;margin-bottom:8px">
    </div>
    <div id="aete-list" style="overflow-y:auto;flex:1;background:#09090f"></div>
  </div>
</div>

<!-- App -->

<div id="app" style="display:none">
  <div class="header">
    <div class="top-bar">
      <div class="date-lbl" id="date-lbl"></div>
      <div class="hbtns">
        <button class="hbtn" onclick="openGoalModal()">🎯 目標</button>
        <button class="hbtn" onclick="openKeyModal()">⚙️ APIキー</button>
      </div>
    </div>
    <div class="gauge-wrap">
      <svg width="176" height="176" style="position:absolute;top:0;left:0">
        <circle cx="88" cy="88" r="76" fill="none" stroke="#1a1a2e" stroke-width="10"/>
        <circle id="gauge-arc" cx="88" cy="88" r="76" fill="none" stroke="#22d3ee" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="477.5" stroke-dashoffset="477.5"
          transform="rotate(-90 88 88)" style="transition:stroke-dashoffset .8s,stroke .5s"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-cal" id="gauge-cal" style="color:#22d3ee">0</div>
        <div class="gauge-rem" id="gauge-rem" style="color:#666">残り 1800 kcal</div>
        <div class="gauge-sub" id="gauge-sub">目標 1800 kcal<br>ご飯 600g/日</div>
      </div>
    </div>
    <div class="macros">
      <div>
        <div class="macro-lbl"><span>脂質</span><span id="fat-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="fat-bar" style="width:0%;background:#ec4899"></div></div>
      </div>
      <div>
        <div class="macro-lbl"><span>糖質</span><span id="carbs-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="carbs-bar" style="width:0%;background:#818cf8"></div></div>
      </div>
      <div>
        <div class="macro-lbl"><span>タンパク質</span><span id="protein-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="protein-bar" style="width:0%;background:#22d3ee"></div></div>
      </div>
    </div>
    <div class="seg-bar" id="seg-bar"></div>
    <div class="seg-legend" id="seg-legend"></div>
  </div>

  <div class="rice-box" id="rice-box">
    <div class="rice-title">🍚 夕食のご飯量アドバイス</div>
    <div class="rice-content" id="rice-content"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-food" onclick="showTab('food')">🍽️ 食事</button>
    <button class="tab-btn" id="tab-weight" onclick="showTab('weight')">⚖️ 体重</button>
  </div>

  <div class="sections" id="sections"></div>

  <div class="w-section" id="w-section">
    <div class="w-card">
      <div class="w-card-title">今日の体重</div>
      <input id="w-input" class="w-input" type="number" step="0.1" placeholder="00.0">
      <button class="w-save-btn" onclick="saveWeight()">記録する</button>
      <div class="w-compare" id="w-compare"></div>
    </div>
    <div class="w-card">
      <div class="w-card-title">体重推移（14日）</div>
      <canvas id="w-chart" style="width:100%;height:160px;display:block"></canvas>
      <div id="w-list" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const MEALS = [
  {key:'morning', label:'朝食', emoji:'🌅', color:'#f59e0b'},
  {key:'lunch',   label:'昼食', emoji:'☀️',  color:'#10b981'},
  {key:'snack',   label:'おやつ', emoji:'🍪', color:'#ec4899'},
  {key:'dinner',  label:'夕食', emoji:'🌙', color:'#818cf8'},
];
const QUICK_MORNING = [
  {name:'ご飯140g', cal:235, fat:0, carbs:52, protein:4},
  {name:'卵焼き', cal:80, fat:5, carbs:2, protein:6},
  {name:'納豆', cal:100, fat:5, carbs:6, protein:8},
  {name:'味噌汁', cal:40, fat:1, carbs:5, protein:2},
  {name:'レタスサラダ', cal:20, fat:0, carbs:3, protein:1},
  {name:'りんご', cal:80, fat:0, carbs:20, protein:0},
  {name:'みかん', cal:45, fat:0, carbs:11, protein:1},
];

let apiKey = '';
let goalCal = 1800;
let goalRice = 600;
let weightPw = '';
let weightUnlocked = false;
let mealData = {morning:[], lunch:[], snack:[], dinner:[]};
let weightData = {};
let favorites = [];
let openSecs = {morning:true, lunch:true, snack:true, dinner:true};
let aeteMealKey = 'lunch';

// ── Storage ────────────────────────────────────────────────────────────────
function load() {
  try {
    apiKey      = localStorage.getItem('c_apikey') || '';
    goalCal     = parseInt(localStorage.getItem('c_goalcal')) || 1800;
    goalRice    = parseInt(localStorage.getItem('c_goalrice')) || 600;
    weightPw    = localStorage.getItem('c_weightpw') || '';
    weightData  = JSON.parse(localStorage.getItem('c_weight') || '{}');
    favorites   = JSON.parse(localStorage.getItem('c_favs') || '[]');
  } catch(e) {}
}
function save(key, val) { try { localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)); } catch(e) {} }

// ── Modal helpers ──────────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function saveApiKey() {
  const v = document.getElementById('api-input').value.trim();
  if (!v) return;
  apiKey = v;
  save('c_apikey', v);
  document.getElementById('api-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  startApp();
}

function openKeyModal() {
  document.getElementById('key-modal-input').value = apiKey;
  document.getElementById('key-modal').style.display = 'flex';
}
function saveKeyModal() {
  const v = document.getElementById('key-modal-input').value.trim();
  if (v) { apiKey = v; save('c_apikey', v); }
  closeModal('key-modal');
}

function openGoalModal() {
  document.getElementById('goal-cal-input').value = goalCal;
  document.getElementById('goal-rice-input').value = goalRice;
  document.getElementById('goal-pw-input').value = weightPw;
  document.getElementById('goal-modal').style.display = 'flex';
}
function saveGoalModal() {
  const c = parseInt(document.getElementById('goal-cal-input').value);
  const r = parseInt(document.getElementById('goal-rice-input').value);
  const pw = document.getElementById('goal-pw-input').value;
  if (c > 0) { goalCal = c; save('c_goalcal', c); }
  if (r > 0) { goalRice = r; save('c_goalrice', r); }
  weightPw = pw;
  weightUnlocked = false;
  save('c_weightpw', pw);
  renderAll();
  closeModal('goal-modal');
}

function checkPw() {
  const v = document.getElementById('pw-input').value;
  if (v === weightPw) {
    weightUnlocked = true;
    closeModal('pw-modal');
    doShowWeight();
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function showTab(tab) {
  if (tab === 'weight') {
    if (weightPw && !weightUnlocked) {
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-error').style.display = 'none';
      document.getElementById('pw-modal').style.display = 'flex';
      return;
    }
    doShowWeight();
  } else {
    weightUnlocked = false;
    document.getElementById('sections').style.display = 'block';
    document.getElementById('w-section').style.display = 'none';
    document.getElementById('rice-box').style.display = '';
    document.getElementById('tab-food').className = 'tab-btn active';
    document.getElementById('tab-weight').className = 'tab-btn';
  }
}
function doShowWeight() {
  document.getElementById('sections').style.display = 'none';
  document.getElementById('w-section').style.display = 'block';
  document.getElementById('rice-box').style.display = 'none';
  document.getElementById('tab-food').className = 'tab-btn';
  document.getElementById('tab-weight').className = 'tab-btn active';
  renderWeightSection();
}

// ── Totals ─────────────────────────────────────────────────────────────────
function getTotals(keys) {
  return (keys || ['morning','lunch','snack','dinner']).reduce((a, k) => {
    (mealData[k]||[]).forEach(e => {
      a.calories += e.total?.calories || 0;
      a.fat      += e.total?.fat      || 0;
      a.carbs    += e.total?.carbs    || 0;
      a.protein  += e.total?.protein  || 0;
    });
    return a;
  }, {calories:0, fat:0, carbs:0, protein:0});
}

// ── Render gauge ───────────────────────────────────────────────────────────
function renderGauge(t) {
  const pct = Math.min(1, t.calories / goalCal);
  const over = t.calories > goalCal;
  const color = over ? '#ef4444' : pct > 0.85 ? '#f97316' : pct > 0.55 ? '#f59e0b' : '#22d3ee';
  const arc = document.getElementById('gauge-arc');
  arc.style.strokeDashoffset = 2 * Math.PI * 76 * (1 - pct);
  arc.style.stroke = color;
  const calEl = document.getElementById('gauge-cal');
  calEl.textContent = t.calories;
  calEl.style.color = color;
  const remEl = document.getElementById('gauge-rem');
  remEl.textContent = over ? `+${t.calories - goalCal} kcal 超過` : `残り ${goalCal - t.calories} kcal`;
  remEl.style.color = over ? '#ef4444' : '#666';
  document.getElementById('gauge-sub').innerHTML = `目標 ${goalCal} kcal<br>ご飯 ${goalRice}g/日`;
}

// ── Render macros ──────────────────────────────────────────────────────────
function renderMacros(t) {
  const G = {fat:60, carbs:220, protein:80};
  ['fat','carbs','protein'].forEach(k => {
    document.getElementById(k+'-val').textContent = t[k] + 'g';
    const bar = document.getElementById(k+'-bar');
    bar.style.width = Math.min(100, t[k]/G[k]*100) + '%';
  });
  document.getElementById('fat-bar').style.background    = t.fat     > G.fat     ? '#ef4444' : '#ec4899';
  document.getElementById('carbs-bar').style.background  = t.carbs   > G.carbs   ? '#ef4444' : '#818cf8';
  document.getElementById('protein-bar').style.background= t.protein > G.protein ? '#ef4444' : '#22d3ee';
}

// ── Render seg bar ─────────────────────────────────────────────────────────
function renderSeg() {
  const bar = document.getElementById('seg-bar');
  const legend = document.getElementById('seg-legend');
  bar.innerHTML = ''; legend.innerHTML = '';
  MEALS.forEach(m => {
    const cal = (mealData[m.key]||[]).reduce((s,e)=>s+(e.total?.calories||0),0);
    const d = document.createElement('div');
    d.style.cssText = `width:${Math.min(100,cal/goalCal*100)}%;background:${m.color};transition:width .5s`;
    bar.appendChild(d);
    const item = document.createElement('div');
    item.className = 'seg-item';
    item.innerHTML = `<div class="seg-dot" style="background:${m.color}"></div>${m.label}<span style="color:${cal>0?m.color:'#333'}">${cal>0?cal:'—'}</span>`;
    legend.appendChild(item);
  });
}

// ── Rice advice ────────────────────────────────────────────────────────────
function renderRice() {
  const box = document.getElementById('rice-box');
  const cnt = document.getElementById('rice-content');
  const sf = getTotals(['morning','lunch','snack']);
  if (!sf.calories) { box.style.display='none'; return; }
  box.style.display = 'block';
  if ((mealData.dinner||[]).length > 0) {
    const all = getTotals();
    const diff = all.calories - goalCal;
    cnt.innerHTML = diff > 100 ? `今日は <span style="color:#ef4444;font-weight:700">+${diff} kcal 超過</span>。明日は少し控えめに。`
      : diff < -200 ? `まだ <span style="color:#10b981;font-weight:700">${Math.abs(diff)} kcal</span> 余裕あり。`
      : `<span style="color:#10b981;font-weight:700">ほぼ目標通り！今日よく頑張りました👍</span>`;
    return;
  }
  const totalCarbsAsRice = Math.round(sf.carbs / 37 * 100);
  const riceRem = Math.max(0, goalRice - totalCarbsAsRice);
  const remCal = goalCal - sf.calories;
  const riceKcal = Math.round(riceRem * 1.68);
  const bowl = riceRem >= 250 ? '大盛り' : riceRem >= 180 ? '普通盛り' : riceRem >= 120 ? '小盛り' : riceRem >= 60 ? '少量' : 'なし';
  cnt.innerHTML = riceRem <= 0
    ? `糖質がご飯目標に達しています。夕食は <span style="color:#f59e0b;font-weight:700">ご飯なし</span> でおかず中心に。残り ${remCal} kcal。`
    : `糖質合計 ${sf.carbs}g → ご飯換算 ${totalCarbsAsRice}g（目標 ${goalRice}g）<br>🍚 夕食のご飯 <span style="color:#10b981;font-weight:700;font-size:17px">${riceRem}g（${bowl}）</span><br><span style="font-size:12px;color:#555">ご飯で ${riceKcal} kcal・おかずで残り ${remCal - riceKcal} kcal</span>`;
}

function renderAll() {
const t = getTotals();
renderGauge(t);

renderSections();

}

// ── Actions ────────────────────────────────────────────────────────────────
function toggleSec(key) { openSecs[key] = !openSecs[key]; renderAll(); }
function toggleEntry(key, i) {
const el = document.getElementById(`det-${key}-${i}`);
if (el) el.style.display = el.style.display === ‘none’ ? ‘block’ : ‘none’;
}
function deleteEntry(key, i) { mealData[key].splice(i, 1); renderAll(); }

function toggleFav(key, i) {
const entry = mealData[key][i];
if (!entry) return;
const idx = favorites.findIndex(f => f.input === entry.input);
if (idx >= 0) { favorites.splice(idx, 1); }
else { favorites.push({…entry, mealKey: key}); }
save(‘c_favs’, favorites);
renderAll();
}
function applyFav(key, fi) {
const f = favorites[fi];
if (!f) return;
mealData[key].push({…f, id: Date.now()});
renderAll();
}
function deleteFav(fi) { favorites.splice(fi, 1); save(‘c_favs’, favorites); renderAll(); }

function addQuick(key, name, cal, fat, carbs, protein) {
mealData[key].push({
input: name,
meals: [{name, calories:cal, fat, carbs, protein, amount:‘1食分’}],
total: {calories:cal, fat, carbs, protein},
advice: ‘’, score: 7, id: Date.now()
});
renderAll();
}

async function analyze(mealKey) {
const ta = document.getElementById(`ta-${mealKey}`);
const btn = document.getElementById(`btn-${mealKey}`);
const err = document.getElementById(`err-${mealKey}`);
const text = ta.value.trim();
if (!text) return;
const color = MEALS.find(m=>m.key===mealKey).color;
btn.disabled = true;
btn.innerHTML = ‘<span class="spinner"></span> 解析中…’;
btn.style.background = ‘#1a1a2e’; btn.style.color = ‘#555’;
err.style.display = ‘none’;
try {
const res = await fetch(’/api/analyze’, {
method:‘POST’, headers:{‘Content-Type’:‘application/json’},
body: JSON.stringify({text, apiKey}),
});
const parsed = await res.json();
if (!res.ok) throw new Error(parsed.error || ’HTTP ’ + res.status);
mealData[mealKey].push({input:text, …parsed, id:Date.now()});
ta.value = ‘’;
renderAll();
} catch(e) {
err.textContent = ’⚠️ ’ + e.message;
err.style.display = ‘block’;
}
btn.disabled = false; btn.innerHTML = ‘解析する’;
btn.style.background = color; btn.style.color = ‘#000’;
}

// ── Weight ─────────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }

function saveWeight() {
const v = parseFloat(document.getElementById(‘w-input’).value);
if (!v || v < 20 || v > 300) return;
weightData[todayStr()] = v;
save(‘c_weight’, weightData);
renderWeightSection();
}

function renderWeightSection() {
const today = todayStr();
if (weightData[today]) document.getElementById(‘w-input’).value = weightData[today];
const cmp = document.getElementById(‘w-compare’);
const yest = new Date(); yest.setDate(yest.getDate()-1);
const yKey = yest.toISOString().slice(0,10);
const tVal = weightData[today], yVal = weightData[yKey];
if (tVal && yVal) {
const diff = (tVal-yVal).toFixed(1);
const color = diff > 0 ? ‘#ef4444’ : diff < 0 ? ‘#10b981’ : ‘#555’;
const emoji = diff > 0 ? ‘📈’ : diff < 0 ? ‘📉’ : ‘➡️’;
cmp.innerHTML = `<span style="color:${color};font-size:15px;font-weight:700">${emoji} 前日比 ${diff>0?'+':''}${diff} kg</span>`;
} else { cmp.textContent = tVal ? ‘前日のデータなし’ : ‘’; }
drawChart();
const keys = Object.keys(weightData).sort().slice(-7).reverse();
document.getElementById(‘w-list’).innerHTML = keys.map(k => {
const d = new Date(k+‘T00:00:00’);
const label = d.toLocaleDateString(‘ja-JP’,{month:‘numeric’,day:‘numeric’,weekday:‘short’});
const val = weightData[k];
const allKeys = Object.keys(weightData).sort();
const prev = weightData[allKeys[allKeys.indexOf(k)-1]];
let diffStr = ‘’;
if (prev) { const df=(val-prev).toFixed(1); diffStr=`<span style="font-size:11px;color:${df>0?'#ef4444':df<0?'#10b981':'#555'}">${df>0?'+':''}${df}</span>`; }
const isT = k === today;
return `<div class="w-list-item"><span style="color:${isT?'#818cf8':'#666'}">${label}${isT?' 今日':''}</span><div style="display:flex;align-items:center;gap:8px">${diffStr}<span style="font-family:monospace;font-size:14px;color:${isT?'#818cf8':'#ccc'};font-weight:${isT?700:400}">${val} kg</span></div></div>`;
}).join(’’);
}

function drawChart() {
const canvas = document.getElementById(‘w-chart’);
if (!canvas) return;
const W = canvas.offsetWidth||320, H = 160, dpr = window.devicePixelRatio||1;
canvas.width = W*dpr; canvas.height = H*dpr;
const ctx = canvas.getContext(‘2d’);
ctx.scale(dpr, dpr);
const days = Array.from({length:14},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(13-i));return d.toISOString().slice(0,10);});
const vals = days.map(d=>weightData[d]||null);
const valid = vals.filter(v=>v!==null);
if (!valid.length) { ctx.fillStyle=’#333’;ctx.font=‘12px sans-serif’;ctx.textAlign=‘center’;ctx.fillText(‘データがありません’,W/2,H/2);return; }
const minV=Math.min(…valid)-1, maxV=Math.max(…valid)+1;
const pad={t:14,b:22,l:30,r:10}, gW=W-pad.l-pad.r, gH=H-pad.t-pad.b;
const xS=i=>pad.l+i/13*gW, yS=v=>pad.t+gH-(v-minV)/(maxV-minV)*gH;
ctx.strokeStyle=’#1a1a2e’;ctx.lineWidth=1;
[0,1,2,3].forEach(i=>{const y=pad.t+i/3*gH;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle=’#333’;ctx.font=‘9px monospace’;ctx.textAlign=‘right’;ctx.fillText((maxV-i/3*(maxV-minV)).toFixed(1),pad.l-3,y+3);});
days.forEach((d,i)=>{if(i%2===0){const dd=new Date(d+‘T00:00:00’);ctx.fillStyle=’#333’;ctx.font=‘9px sans-serif’;ctx.textAlign=‘center’;ctx.fillText(`${dd.getMonth()+1}/${dd.getDate()}`,xS(i),H-4);}});
const pts=vals.map((v,i)=>v!==null?{x:xS(i),y:yS(v)}:null).filter(Boolean);
if (!pts.length) return;
ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
ctx.lineTo(pts[pts.length-1].x,H-pad.b);ctx.lineTo(pts[0].x,H-pad.b);ctx.closePath();
ctx.fillStyle=‘rgba(129,140,248,0.12)’;ctx.fill();
ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
ctx.strokeStyle=’#818cf8’;ctx.lineWidth=2;ctx.lineJoin=‘round’;ctx.stroke();
const today=todayStr();
vals.forEach((v,i)=>{if(!v)return;const isT=days[i]===today;ctx.beginPath();ctx.arc(xS(i),yS(v),isT?5:3,0,Math.PI*2);ctx.fillStyle=’#818cf8’;ctx.fill();if(isT){ctx.beginPath();ctx.arc(xS(i),yS(v),5,0,Math.PI*2);ctx.strokeStyle=’#fff’;ctx.lineWidth=1.5;ctx.stroke();}});
}

// ── Start ──────────────────────────────────────────────────────────────────
function startApp() {
document.getElementById(‘date-lbl’).textContent =
new Date().toLocaleDateString(‘ja-JP’,{month:‘long’,day:‘numeric’,weekday:‘short’});
renderAll();
}

load();
if (apiKey) {
document.getElementById(‘api-screen’).style.display = ‘none’;
document.getElementById(‘app’).style.display = ‘block’;
startApp();
}
</script>
