<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>カロリートラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;color:#e0e0e0;font-family:'Helvetica Neue','Hiragino Sans',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:60px}
input,textarea,button{font-family:inherit}
textarea{resize:none;outline:none}
input{outline:none}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:16px;padding:24px;width:100%;max-width:400px}
.modal h3{font-size:16px;font-weight:700;color:#e0e0e0;margin-bottom:14px}
.modal-label{font-size:11px;color:#888;margin-bottom:6px;margin-top:12px;display:block}
.modal-input{width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:10px;padding:10px 14px;color:#e0e0e0;font-size:18px;font-family:monospace;text-align:center}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-cancel{flex:1;background:#1a1a2e;border:none;border-radius:10px;padding:12px;color:#666;cursor:pointer;font-family:inherit}
.modal-save{flex:1;background:#f59e0b;border:none;border-radius:10px;padding:12px;color:#000;font-weight:700;cursor:pointer;font-family:inherit}
.header{padding:24px 20px 20px;border-bottom:1px solid #0f0f1c;background:linear-gradient(180deg,#0d0d1a,#07070f)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.date-lbl{font-size:10px;color:#333;letter-spacing:2px;text-transform:uppercase}
.hbtns{display:flex;gap:6px}
.hbtn{background:none;border:1px solid #1a1a2e;border-radius:8px;padding:5px 10px;color:#555;font-size:11px;cursor:pointer}
.gauge-wrap{position:relative;width:176px;height:176px;margin:0 auto}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-cal{font-size:38px;font-weight:700;line-height:1}
.gauge-rem{font-size:12px;font-weight:600;margin-top:6px}
.gauge-sub{font-size:9px;color:#333;margin-top:3px;text-align:center;line-height:1.5}
.macros{margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px}
.macro-lbl{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;color:#555}
.pill{height:5px;background:#1a1a2e;border-radius:99px;overflow:hidden}
.pill-fill{height:100%;border-radius:99px;transition:width .5s}
.seg-bar{height:7px;background:#1a1a2e;border-radius:99px;display:flex;overflow:hidden;margin-top:14px}
.seg-legend{display:flex;justify-content:center;gap:12px;margin-top:8px;flex-wrap:wrap}
.seg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.seg-dot{width:6px;height:6px;border-radius:99px;flex-shrink:0}
.rice-box{margin:10px 14px 0;background:linear-gradient(135deg,#0a1a0a,#071207);border:1px solid #10b98128;border-radius:14px;padding:14px;display:none}
.rice-title{font-size:10px;color:#10b981;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.rice-content{font-size:13px;color:#ccc;line-height:1.8}
.tabs{display:flex;gap:8px;padding:12px 14px 0}
.tab-btn{flex:1;border:1px solid #151520;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.tab-btn.active{background:#818cf8;color:#000;border-color:#818cf8}
.tab-btn:not(.active){background:#09090f;color:#555}
.sections{padding:10px 14px 0}
.meal-sec{background:#09090f;border:1px solid #151520;border-radius:16px;overflow:hidden;margin-bottom:10px}
.meal-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.meal-info{flex:1}
.meal-title-row{display:flex;align-items:center;gap:8px}
.meal-name{font-size:14px;font-weight:600;color:#ccc}
.meal-kcal{font-size:13px}
.meal-cnt{font-size:10px;color:#444;background:#151520;border-radius:99px;padding:1px 7px}
.meal-mini{height:3px;background:#151520;border-radius:99px;margin-top:6px;overflow:hidden}
.meal-mini-fill{height:100%;border-radius:99px;transition:width .5s}
.meal-body{border-top:1px solid #151520;padding:12px 14px}
.quick-btns{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.quick-btn{background:#0f0f1a;border:1px solid #f59e0b40;border-radius:20px;padding:4px 10px;font-size:11px;color:#f59e0b;cursor:pointer;font-family:inherit}
.entry{background:#0c0c1a;border:1px solid #1a1a2e;border-radius:10px;margin-bottom:6px;overflow:hidden}
.entry-hdr{padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.entry-text{flex:1;min-width:0}
.entry-name{font-size:13px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-nums{display:flex;gap:8px;margin-top:2px;font-size:11px;color:#555}
.entry-kcal{color:#f59e0b}
.entry-del{background:none;border:none;color:#2a2a3e;cursor:pointer;font-size:14px;padding:2px 6px}
.fav-star{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px}
.entry-detail{border-top:1px solid #1a1a2e;padding:11px 13px;display:none}
.entry-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #0f0f1c;color:#888}
.entry-row span:last-child{color:#f59e0b}
.advice-box{margin-top:8px;padding:9px 11px;background:#080814;border-radius:8px;font-size:12px;color:#888;line-height:1.7}
.input-box{background:#06060e;border:1px solid #151520;border-radius:11px;padding:10px 12px;margin-top:6px}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.input-hint{font-size:10px;color:#2a2a3e}
.input-btns{display:flex;gap:6px}
.analyze-btn{border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.aete-btn{background:#09090f;border:1px solid #818cf840;border-radius:9px;padding:8px 10px;color:#818cf8;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.err-msg{font-size:11px;color:#f87171;background:#1c0a0a;border-radius:7px;padding:6px 10px;margin-top:6px;line-height:1.5;display:none}
.fav-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fav-chip{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:20px;padding:5px 12px;font-size:12px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:6px}
.fav-chip-kcal{font-size:10px;color:#555}
.fav-chip-del{color:#333;font-size:11px;cursor:pointer;margin-left:2px}
.w-section{padding:10px 14px 0;display:none}
.w-card{background:#09090f;border:1px solid #151520;border-radius:16px;padding:16px;margin-bottom:12px}
.w-card-title{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.w-input{width:100%;background:#06060e;border:1px solid #1a1a2e;border-radius:10px;padding:12px;color:#e0e0e0;font-size:24px;font-family:monospace;text-align:center;margin-bottom:10px}
.w-save-btn{width:100%;background:#818cf8;border:none;border-radius:10px;padding:12px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.w-compare{margin-top:10px;text-align:center;font-size:14px;min-height:18px}
.w-list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0f0f1c;font-size:12px}
.spinner{display:inline-block;width:11px;height:11px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<script>
function saveApiKey() {
  var v = document.getElementById('api-input').value.trim();
  if (!v) { alert('APIキーを入力してください'); return; }
  apiKey = v;
  try { localStorage.setItem('c_apikey', v); } catch(e) {}
  document.getElementById('api-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  startApp();
}
</script>

<!-- API Key Screen -->

<div id="api-screen" style="position:fixed;inset:0;background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:100">
  <div style="font-size:40px">🔑</div>
  <h2 style="font-size:20px;font-weight:700;color:#e0e0e0;margin:12px 0 8px;text-align:center">APIキーを設定</h2>
  <p style="font-size:13px;color:#555;text-align:center;line-height:1.6;margin-bottom:20px">platform.claude.com で発行した<br>APIキーを貼り付けてください</p>
  <textarea id="api-input" rows="3" style="width:100%;background:#0f0f1a;border:1px solid #1a1a2e;border-radius:12px;padding:12px 16px;color:#ccc;font-size:13px;font-family:monospace;line-height:1.5;outline:none" placeholder="sk-ant-api..."></textarea>
  <button onclick="try{saveApiKey()}catch(e){alert('エラー: '+e.message)}" style="margin-top:14px;width:100%;background:#f59e0b;border:none;border-radius:12px;padding:14px;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">保存して開始</button>
  <p style="font-size:11px;color:#333;margin-top:12px">キーはこの端末のみに保存されます</p>
</div>

<!-- Modals -->

<div id="key-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>APIキーを変更</h3>
    <textarea id="key-modal-input" rows="3" style="width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:10px;padding:10px 14px;color:#ccc;font-size:12px;font-family:monospace;outline:none;resize:none"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('key-modal')">キャンセル</button>
      <button class="modal-save" onclick="saveKeyModal()">保存</button>
    </div>
  </div>
</div>

<div id="goal-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>🎯 目標設定</h3>
    <label class="modal-label">1日の目標カロリー (kcal)</label>
    <input id="goal-cal-input" class="modal-input" type="number" placeholder="1800">
    <label class="modal-label">1日のご飯目標 (g)</label>
    <input id="goal-rice-input" class="modal-input" type="number" placeholder="600">
    <label class="modal-label">体重タブのパスワード（任意）</label>
    <input id="goal-pw-input" class="modal-input" type="password" placeholder="空白でパスワードなし">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('goal-modal')">キャンセル</button>
      <button class="modal-save" onclick="saveGoalModal()">保存</button>
    </div>
  </div>
</div>

<div id="pw-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>🔒 体重データ</h3>
    <p style="font-size:12px;color:#666;margin-bottom:14px">パスワードを入力してください</p>
    <input id="pw-input" type="password" class="modal-input" placeholder="••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="font-size:11px;color:#ef4444;text-align:center;margin-top:8px;display:none">パスワードが違います</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('pw-modal')">キャンセル</button>
      <button class="modal-save" onclick="checkPw()">確認</button>
    </div>
  </div>
</div>

<div id="aete-modal" class="modal-bg" style="display:none">
  <div class="modal" style="max-height:80vh;display:flex;flex-direction:column;padding:0;overflow:hidden">
    <div style="padding:16px 16px 0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <h3 style="font-size:16px;font-weight:700;color:#e0e0e0">🍱 あえて、を選ぶ</h3>
        <button onclick="closeModal('aete-modal')" style="background:none;border:none;color:#555;font-size:20px;cursor:pointer">✕</button>
      </div>
      <input id="aete-search" type="text" placeholder="メニューを検索…" oninput="renderAeteList()"
        style="width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:8px;padding:9px 12px;color:#e0e0e0;font-size:13px;outline:none;margin-bottom:8px">
    </div>
    <div id="aete-list" style="overflow-y:auto;flex:1;background:#09090f"></div>
  </div>
</div>

<!-- App -->

<div id="app" style="display:none">
  <div class="header">
    <div class="top-bar">
      <div class="date-lbl" id="date-lbl"></div>
      <div class="hbtns">
        <button class="hbtn" onclick="openGoalModal()">🎯 目標</button>
        <button class="hbtn" onclick="openKeyModal()">⚙️ APIキー</button>
      </div>
    </div>
    <div class="gauge-wrap">
      <svg width="176" height="176" style="position:absolute;top:0;left:0">
        <circle cx="88" cy="88" r="76" fill="none" stroke="#1a1a2e" stroke-width="10"/>
        <circle id="gauge-arc" cx="88" cy="88" r="76" fill="none" stroke="#22d3ee" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="477.5" stroke-dashoffset="477.5"
          transform="rotate(-90 88 88)" style="transition:stroke-dashoffset .8s,stroke .5s"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-cal" id="gauge-cal" style="color:#22d3ee">0</div>
        <div class="gauge-rem" id="gauge-rem" style="color:#666">残り 1800 kcal</div>
        <div class="gauge-sub" id="gauge-sub">目標 1800 kcal<br>ご飯 600g/日</div>
      </div>
    </div>
    <div class="macros">
      <div>
        <div class="macro-lbl"><span>脂質</span><span id="fat-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="fat-bar" style="width:0%;background:#ec4899"></div></div>
      </div>
      <div>
        <div class="macro-lbl"><span>糖質</span><span id="carbs-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="carbs-bar" style="width:0%;background:#818cf8"></div></div>
      </div>
      <div>
        <div class="macro-lbl"><span>タンパク質</span><span id="protein-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="protein-bar" style="width:0%;background:#22d3ee"></div></div>
      </div>
    </div>
    <div class="seg-bar" id="seg-bar"></div>
    <div class="seg-legend" id="seg-legend"></div>
  </div>

  <div class="rice-box" id="rice-box">
    <div class="rice-title">🍚 夕食のご飯量アドバイス</div>
    <div class="rice-content" id="rice-content"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-food" onclick="showTab('food')">🍽️ 食事</button>
    <button class="tab-btn" id="tab-weight" onclick="showTab('weight')">⚖️ 体重</button>
  </div>

  <div class="sections" id="sections"></div>

  <div class="w-section" id="w-section">
    <div class="w-card">
      <div class="w-card-title">今日の体重</div>
      <input id="w-input" class="w-input" type="number" step="0.1" placeholder="00.0">
      <button class="w-save-btn" onclick="saveWeight()">記録する</button>
      <div class="w-compare" id="w-compare"></div>
    </div>
    <div class="w-card">
      <div class="w-card-title">体重推移（14日）</div>
      <canvas id="w-chart" style="width:100%;height:160px;display:block"></canvas>
      <div id="w-list" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<script src="/app.js"></script>

</body>
</html>
