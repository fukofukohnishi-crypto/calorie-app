<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>カロリートラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070f;color:#e0e0e0;font-family:'Helvetica Neue','Hiragino Sans',sans-serif;max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:60px}
input,textarea,button{font-family:inherit}
textarea{resize:none;outline:none}
input{outline:none}

/* API Key Screen */
#api-screen{position:fixed;inset:0;background:#07070f;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:100}
#api-screen h2{font-size:20px;font-weight:700;color:#e0e0e0;margin:12px 0 8px;text-align:center}
#api-screen p{font-size:13px;color:#555;text-align:center;line-height:1.6;margin-bottom:24px}
.api-textarea{width:100%;background:#0f0f1a;border:1px solid #1a1a2e;border-radius:12px;padding:12px 16px;color:#ccc;font-size:13px;font-family:monospace;line-height:1.5}
#api-save-btn{margin-top:16px;width:100%;background:#f59e0b;border:none;border-radius:12px;padding:14px;color:#000;font-size:15px;font-weight:700;cursor:pointer}
.api-note{font-size:11px;color:#333;margin-top:12px;text-align:center}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:16px;padding:24px;width:100%;max-width:400px}
.modal h3{font-size:16px;font-weight:700;color:#e0e0e0;margin-bottom:16px}
.modal-input{width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:10px;padding:10px 14px;color:#e0e0e0;font-size:20px;font-family:monospace;text-align:center}
.modal-label{font-size:11px;color:#888;margin-bottom:6px;margin-top:12px;display:block}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-cancel{flex:1;background:#1a1a2e;border:none;border-radius:10px;padding:12px;color:#666;cursor:pointer}
.modal-save{flex:1;background:#f59e0b;border:none;border-radius:10px;padding:12px;color:#000;font-weight:700;cursor:pointer}

/* Header */
.header{padding:24px 20px 20px;border-bottom:1px solid #0f0f1c;background:linear-gradient(180deg,#0d0d1a,#07070f)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.date-label{font-size:10px;color:#333;letter-spacing:3px;text-transform:uppercase}
.header-btns{display:flex;gap:6px}
.hbtn{background:none;border:1px solid #1a1a2e;border-radius:8px;padding:5px 10px;color:#555;font-size:11px;cursor:pointer}

/* Gauge */
.gauge-wrap{position:relative;width:176px;height:176px;margin:0 auto}
.gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-cal{font-size:40px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.gauge-rem{font-size:12px;font-weight:600;margin-top:8px}

/* Macros */
.macros{margin-top:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 14px}
.macro-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px;color:#555}
.pill{height:5px;background:#1a1a2e;border-radius:99px;overflow:hidden}
.pill-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* Segment bar */
.seg-bar{height:7px;background:#1a1a2e;border-radius:99px;display:flex;overflow:hidden;margin-top:14px}
.seg-legend{display:flex;justify-content:center;gap:12px;margin-top:8px;flex-wrap:wrap}
.seg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555}
.seg-dot{width:6px;height:6px;border-radius:99px;flex-shrink:0}

/* Rice advice */
.rice-box{margin:12px 14px 0;background:linear-gradient(135deg,#0a1a0a,#071207);border:1px solid #10b98128;border-radius:14px;padding:14px;display:none}
.rice-title{font-size:10px;color:#10b981;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.rice-content{font-size:13px;color:#ccc;line-height:1.8}

/* Tabs */
.tabs{display:flex;gap:8px;padding:12px 14px 0}
.tab-btn{flex:1;border:1px solid #151520;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#818cf8;color:#000;border-color:#818cf8}
.tab-btn:not(.active){background:#09090f;color:#555}

/* Meal sections */
.sections{padding:10px 14px 0}
.meal-sec{background:#09090f;border:1px solid #151520;border-radius:16px;overflow:hidden;margin-bottom:10px;transition:border-color .3s}
.meal-header{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer}
.meal-emoji{font-size:18px;line-height:1}
.meal-info{flex:1}
.meal-title-row{display:flex;align-items:center;gap:8px}
.meal-name{font-size:14px;font-weight:600;color:#ccc}
.meal-kcal{font-size:13px}
.meal-count{font-size:10px;color:#444;background:#151520;border-radius:99px;padding:1px 7px}
.meal-mini{height:3px;background:#151520;border-radius:99px;margin-top:6px;overflow:hidden}
.meal-mini-fill{height:100%;border-radius:99px;transition:width .5s ease}
.meal-arrow{color:#333;font-size:11px}
.meal-body{border-top:1px solid #151520;padding:12px 14px}

/* Entry cards */
.entry{background:#0c0c1a;border:1px solid #1a1a2e;border-radius:10px;margin-bottom:6px;overflow:hidden}
.entry-head{padding:10px 13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.entry-text{flex:1;min-width:0}
.entry-name{font-size:13px;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-nums{display:flex;gap:10px;margin-top:2px;font-size:11px;color:#555}
.entry-kcal{color:#f59e0b}
.entry-del{background:none;border:none;color:#2a2a3e;cursor:pointer;font-size:14px;padding:2px 6px}
.entry-detail{border-top:1px solid #1a1a2e;padding:11px 13px;display:none}
.entry-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #0f0f1c;color:#888}
.entry-row span:last-child{color:#f59e0b}
.advice-box{margin-top:10px;padding:9px 11px;background:#080814;border-radius:8px;font-size:12px;color:#888;line-height:1.7}

/* Input box */
.input-box{background:#06060e;border:1px solid #151520;border-radius:11px;padding:10px 12px;margin-top:6px}
.input-box textarea{width:100%;background:none;border:none;color:#ccc;font-size:13px;line-height:1.6}
.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.input-hint{font-size:10px;color:#2a2a3e}
.analyze-btn{border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px}
.err-msg{font-size:11px;color:#f87171;background:#1c0a0a;border-radius:7px;padding:6px 10px;margin-top:6px;line-height:1.5;display:none}

/* Weight section */
.weight-section{padding:10px 14px 0;display:none}
.w-card{background:#09090f;border:1px solid #151520;border-radius:16px;padding:16px;margin-bottom:12px}
.w-card-title{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.w-input-row{display:flex;gap:10px;align-items:center}
.w-input{flex:1;background:#06060e;border:1px solid #1a1a2e;border-radius:10px;padding:12px;color:#e0e0e0;font-size:24px;font-family:monospace;text-align:center}
.w-unit{color:#555;font-size:14px}
.w-save-btn{background:#818cf8;border:none;border-radius:10px;padding:12px 16px;color:#000;font-size:13px;font-weight:700;cursor:pointer}
.w-compare{margin-top:10px;text-align:center;font-size:14px;min-height:20px}
.w-list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0f0f1c;font-size:12px}

/* Favorites */
.fav-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;opacity:0.4;transition:opacity .2s}
.fav-btn.saved{opacity:1}
.fav-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.fav-chip{background:#0f0f1a;border:1px solid #1a1a2e;border-radius:20px;padding:5px 12px;font-size:12px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:6px;transition:border-color .2s}
.fav-chip:active{border-color:#f59e0b}
.fav-chip-del{color:#333;font-size:11px;margin-left:2px}

/* Spinner */
.spinner{display:inline-block;width:11px;height:11px;border:2px solid #333;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- API Key Screen -->
<div id="api-screen">
  <div style="font-size:40px">🔑</div>
  <h2>APIキーを設定</h2>
  <p>platform.claude.com で発行した<br>APIキーを貼り付けてください</p>
  <textarea id="api-input" class="api-textarea" rows="3" placeholder="sk-ant-api..."></textarea>
  <button id="api-save-btn" onclick="saveApiKey()">保存して開始</button>
  <p class="api-note">キーはこの端末のみに保存されます</p>
</div>

<!-- Key Modal -->
<div id="key-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>APIキーを変更</h3>
    <textarea id="key-modal-input" class="api-textarea" rows="3"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeKeyModal()">キャンセル</button>
      <button class="modal-save" onclick="saveKeyModal()">保存</button>
    </div>
  </div>
</div>

<!-- Goal Modal -->
<div id="goal-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>🎯 目標設定</h3>
    <label class="modal-label">1日の目標カロリー (kcal)</label>
    <input id="goal-cal-input" class="modal-input" type="number" placeholder="1800">
    <label class="modal-label">1日のご飯目標 (g)</label>
    <input id="goal-rice-input" class="modal-input" type="number" placeholder="600">
    <div style="font-size:10px;color:#333;margin-top:6px;text-align:center">ご飯以外の糖質は自動でご飯換算して引き算します</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeGoalModal()">キャンセル</button>
      <button class="modal-save" onclick="saveGoalModal()">保存</button>
    </div>
  </div>
</div>

<!-- App -->
<div id="aete-modal" class="modal-bg" style="display:none">
  <div class="modal" style="max-height:80vh;display:flex;flex-direction:column;padding:0;overflow:hidden">
    <div style="padding:16px 16px 0">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="font-size:16px;font-weight:700;color:#e0e0e0">🍱 あえて、を選ぶ</h3>
        <button onclick="closeAeteModal()" style="background:none;border:none;color:#555;font-size:20px;cursor:pointer">✕</button>
      </div>
      <input id="aete-search" type="text" placeholder="メニューを検索…" oninput="aeteSearch=this.value;renderAeteList()"
        style="width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:8px;padding:9px 12px;color:#e0e0e0;font-size:13px;outline:none;margin-bottom:8px">
      <input id="aete-meal-key" type="hidden" value="lunch">
    </div>
    <div id="aete-list" style="overflow-y:auto;flex:1;background:#09090f"></div>
  </div>
</div>
<div id="pw-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <h3>🔒 体重データ</h3>
    <p style="font-size:12px;color:#666;margin-bottom:14px">パスワードを入力してください</p>
    <input id="pw-input" type="password" placeholder="パスワード"
      style="width:100%;background:#07070f;border:1px solid #1a1a2e;border-radius:8px;padding:12px;color:#e0e0e0;font-size:16px;outline:none;text-align:center;letter-spacing:4px"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="font-size:11px;color:#ef4444;text-align:center;margin-top:8px;display:none">パスワードが違います</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closePwModal()">キャンセル</button>
      <button class="modal-save" onclick="checkPw()">確認</button>
    </div>
  </div>
</div>
<div id="app" style="display:none">
  <div class="header">
    <div class="top-bar">
      <div class="date-label" id="date-label"></div>
      <div class="header-btns">
        <button class="hbtn" onclick="openGoalModal()">🎯 目標</button>
        <button class="hbtn" onclick="openKeyModal()">⚙️ APIキー</button>
      </div>
    </div>
    <div class="gauge-wrap">
      <svg width="176" height="176" style="position:absolute;top:0;left:0">
        <circle cx="88" cy="88" r="76" fill="none" stroke="#1a1a2e" stroke-width="10"/>
        <circle id="gauge-arc" cx="88" cy="88" r="76" fill="none" stroke="#22d3ee" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="477.5" stroke-dashoffset="477.5"
          transform="rotate(-90 88 88)" style="transition:stroke-dashoffset .8s ease,stroke .5s"/>
      </svg>
      <div class="gauge-center">
        <div class="gauge-cal" id="gauge-cal" style="color:#22d3ee">0</div>
        <div class="gauge-rem" id="gauge-rem" style="color:#666">残り 1800 kcal</div>
        <div id="gauge-goals" style="margin-top:6px;font-size:10px;color:#333;text-align:center">目標 1800 kcal｜ご飯 600g/日</div>
      </div>
    </div>
    <div class="macros">
      <div>
        <div class="macro-row"><span>脂質</span><span id="fat-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="fat-bar" style="width:0%;background:#ec4899"></div></div>
      </div>
      <div>
        <div class="macro-row"><span>糖質</span><span id="carbs-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="carbs-bar" style="width:0%;background:#818cf8"></div></div>
      </div>
      <div>
        <div class="macro-row"><span>タンパク質</span><span id="protein-val">0g</span></div>
        <div class="pill"><div class="pill-fill" id="protein-bar" style="width:0%;background:#22d3ee"></div></div>
      </div>
    </div>
    <div class="seg-bar" id="seg-bar"></div>
    <div class="seg-legend" id="seg-legend"></div>
  </div>

  <div class="rice-box" id="rice-box">
    <div class="rice-title">🍚 夕食のご飯量アドバイス</div>
    <div class="rice-content" id="rice-content"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-food" onclick="showTab('food')">🍽️ 食事</button>
    <button class="tab-btn" id="tab-weight" onclick="showTab('weight')">⚖️ 体重</button>
  </div>

  <div class="sections" id="sections"></div>

  <div class="weight-section" id="weight-section">
    <div class="w-card">
      <div class="w-card-title">今日の体重</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <input id="w-input" class="w-input" type="number" step="0.1" placeholder="00.0">
        <span class="w-unit">kg</span>
      </div>
      <button class="w-save-btn" onclick="saveWeight()" style="width:100%">記録する</button>
      <div class="w-compare" id="w-compare"></div>
    </div>
    <div class="w-card">
      <div class="w-card-title">体重推移（14日）</div>
      <canvas id="w-chart" style="width:100%;height:160px;display:block"></canvas>
      <div id="w-list" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<script>
const MEALS = [
  {key:'morning', label:'朝食',   emoji:'🌅', color:'#f59e0b'},
  {key:'lunch',   label:'昼食',   emoji:'☀️',  color:'#10b981'},
  {key:'snack',   label:'おやつ', emoji:'🍪', color:'#ec4899'},
  {key:'dinner',  label:'夕食',   emoji:'🌙', color:'#818cf8'},
];
const RICE_CARBS = 37; // per 100g

// State
let apiKey = '';
let goalCal = 1800;
let goalRice = 600;
let mealData = {morning:[], lunch:[], snack:[], dinner:[]};
let weightData = {};
let openSecs = {morning:true, lunch:true, snack:true, dinner:true};

// Load from localStorage safely
function loadState() {
  try {
    apiKey = localStorage.getItem('c_apikey') || '';
    goalCal = parseInt(localStorage.getItem('c_goalcal')) || 1800;
    goalRice = parseInt(localStorage.getItem('c_goalrice')) || 600;
    weightData = JSON.parse(localStorage.getItem('c_weight') || '{}');
    weightPw = localStorage.getItem('c_weightpw') || '';
  } catch(e) {}
}

function saveGoals() {
  try {
    localStorage.setItem('c_goalcal', goalCal);
    localStorage.setItem('c_goalrice', goalRice);
  } catch(e) {}
}

function saveApiKey() {
  const v = document.getElementById('api-input').value.trim();
  if (!v) return;
  try { localStorage.setItem('c_apikey', v); } catch(e) {}
  apiKey = v;
  document.getElementById('api-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  startApp();
}

function openKeyModal() {
  document.getElementById('key-modal-input').value = apiKey;
  document.getElementById('key-modal').style.display = 'flex';
}
function closeKeyModal() { document.getElementById('key-modal').style.display = 'none'; }
function saveKeyModal() {
  const v = document.getElementById('key-modal-input').value.trim();
  if (v) { apiKey = v; try { localStorage.setItem('c_apikey', v); } catch(e) {} }
  closeKeyModal();
}

function openGoalModal() {
  document.getElementById('goal-cal-input').value = goalCal;
  document.getElementById('goal-rice-input').value = goalRice;
  document.getElementById('goal-pw-input').value = weightPw;
  document.getElementById('goal-modal').style.display = 'flex';
}
function closeGoalModal() { document.getElementById('goal-modal').style.display = 'none'; }
function saveGoalModal() {
  const c = parseInt(document.getElementById('goal-cal-input').value);
  const r = parseInt(document.getElementById('goal-rice-input').value);
  const pw = document.getElementById('goal-pw-input').value;
  if (c > 0) goalCal = c;
  if (r > 0) goalRice = r;
  weightPw = pw;
  weightUnlocked = false;
  try { localStorage.setItem('c_weightpw', pw); } catch(e) {}
  saveGoals();
  renderAll();
  closeGoalModal();
}

function showTab(tab) {
  if (tab === 'weight' && weightPw && !weightUnlocked) {
    openPwModal();
    return;
  }
  const isFood = tab === 'food';
  document.getElementById('sections').style.display = isFood ? 'block' : 'none';
  document.getElementById('weight-section').style.display = isFood ? 'none' : 'block';
  document.getElementById('rice-box').style.display = isFood ? '' : 'none';
  document.getElementById('tab-food').className = 'tab-btn' + (isFood ? ' active' : '');
  document.getElementById('tab-weight').className = 'tab-btn' + (!isFood ? ' active' : '');
  if (!isFood) renderWeightSection();
}

function getTotals(keys) {
  keys = keys || ['morning','lunch','snack','dinner'];
  return keys.reduce((acc, key) => {
    (mealData[key]||[]).forEach(e => {
      acc.calories += e.total?.calories || 0;
      acc.fat      += e.total?.fat      || 0;
      acc.carbs    += e.total?.carbs    || 0;
      acc.protein  += e.total?.protein  || 0;
    });
    return acc;
  }, {calories:0, fat:0, carbs:0, protein:0});
}

function renderGauge(t) {
  const pct = Math.min(1, t.calories / goalCal);
  const over = t.calories > goalCal;
  const color = over ? '#ef4444' : pct > 0.85 ? '#f97316' : pct > 0.55 ? '#f59e0b' : '#22d3ee';
  const circ = 2 * Math.PI * 76;
  const arc = document.getElementById('gauge-arc');
  arc.style.strokeDashoffset = circ * (1 - pct);
  arc.style.stroke = color;
  const calEl = document.getElementById('gauge-cal');
  calEl.textContent = t.calories;
  calEl.style.color = color;
  const remEl = document.getElementById('gauge-rem');
  remEl.textContent = over ? `+${t.calories - goalCal} kcal 超過` : `残り ${goalCal - t.calories} kcal`;
  remEl.style.color = over ? '#ef4444' : '#666';
  const goalsEl = document.getElementById('gauge-goals');
  if (goalsEl) goalsEl.textContent = `目標 ${goalCal} kcal｜ご飯 ${goalRice}g/日`;
}

function renderMacros(t) {
  const GOAL = {fat:60, carbs:220, protein:80};
  document.getElementById('fat-val').textContent = t.fat + 'g';
  document.getElementById('carbs-val').textContent = t.carbs + 'g';
  document.getElementById('protein-val').textContent = t.protein + 'g';
  ['fat','carbs','protein'].forEach(k => {
    const bar = document.getElementById(k + '-bar');
    const pct = Math.min(100, t[k] / GOAL[k] * 100);
    bar.style.width = pct + '%';
    bar.style.background = t[k] > GOAL[k] ? '#ef4444' : bar.style.background;
  });
}

function renderSegBar() {
  const bar = document.getElementById('seg-bar');
  const legend = document.getElementById('seg-legend');
  bar.innerHTML = ''; legend.innerHTML = '';
  MEALS.forEach(m => {
    const cal = (mealData[m.key]||[]).reduce((s,e)=>s+(e.total?.calories||0),0);
    const w = Math.min(100, cal / goalCal * 100);
    const d = document.createElement('div');
    d.style.cssText = `width:${w}%;background:${m.color};transition:width .5s`;

function renderRiceAdvice() {
  const box = document.getElementById('rice-box');
  const content = document.getElementById('rice-content');
  const hasDinner = (mealData.dinner||[]).length > 0;
  const sofar = getTotals(['morning','lunch','snack']);
  if (sofar.calories === 0) { box.style.display = 'none'; return; }
  box.style.display = 'block';

  if (hasDinner) {
    const all = getTotals();
    const diff = all.calories - goalCal;
    if (diff > 100) content.innerHTML = `今日は <span style="color:#ef4444;font-weight:700">+${diff} kcal 超過</span>。明日は少し控えめに。`;
    else if (diff < -200) content.innerHTML = `まだ <span style="color:#10b981;font-weight:700">${Math.abs(diff)} kcal</span> 余裕あり。`;
    else content.innerHTML = `<span style="color:#10b981;font-weight:700">今日はほぼ目標通り👍</span>`;
    return;
  }

  // Calculate rice remaining
  // All carbs (rice + non-rice) are converted to rice equivalent
  // Rice: 100g = 37g carbs
  let totalCarbsG = 0;
  ['morning','lunch','snack'].forEach(key => {
    (mealData[key]||[]).forEach(e => {
      totalCarbsG += e.total?.carbs || 0;
    });
  });

  // Convert total carbs to rice equivalent grams
  const totalCarbsAsRiceG = Math.round(totalCarbsG / RICE_CARBS * 100);
  const riceRem = Math.max(0, goalRice - totalCarbsAsRiceG);
  const riceEatenG = totalCarbsAsRiceG; // for display
  const nonRiceAsRiceG = 0; // merged into totalCarbsAsRiceG
  const remCal = goalCal - sofar.calories;
  const riceKcal = Math.round(riceRem * 1.68);
  const remCalAfterRice = remCal - riceKcal;
  const bowl = riceRem >= 250 ? '大盛り' : riceRem >= 180 ? '普通盛り' : riceRem >= 120 ? '小盛り' : riceRem >= 60 ? '少量' : 'なし';

  if (riceRem <= 0) {
    content.innerHTML = `今日の糖質はご飯目標分に達しています。夕食は <span style="color:#f59e0b;font-weight:700">ご飯なし</span> でおかず中心に。残り ${remCal} kcal。`;
  } else {
    content.innerHTML = `
      糖質合計 ${totalCarbsG}g → ご飯換算 ${totalCarbsAsRiceG}g 消費（目標 ${goalRice}g）<br>
      🍚 夕食のご飯 <span style="color:#10b981;font-weight:700;font-size:17px">${riceRem}g（${bowl}）</span><br>
      <span style="font-size:12px;color:#555">ご飯で ${riceKcal} kcal・おかずで残り ${remCalAfterRice} kcal</span>
    `;
  }
}

async function analyze(mealKey) {
  const ta = document.getElementById(`ta-${mealKey}`);
  const btn = document.getElementById(`btn-${mealKey}`);
  const err = document.getElementById(`err-${mealKey}`);
  const text = ta.value.trim();
  if (!text) return;

  const color = MEALS.find(m=>m.key===mealKey).color;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 解析中…';
  btn.style.background = '#1a1a2e';
  btn.style.color = '#555';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text, apiKey}),
    });
    const parsed = await res.json();
    if (!res.ok) throw new Error(parsed.error || 'HTTP ' + res.status);
    mealData[mealKey].push({input:text, ...parsed, id:Date.now()});
    ta.value = '';
    renderAll();
  } catch(e) {
    err.textContent = '⚠️ ' + e.message;
    err.style.display = 'block';
  }

  btn.disabled = false;
  btn.innerHTML = '解析する';
  btn.style.background = color;
  btn.style.color = '#000';
}

// Weight
function todayStr() { return new Date().toISOString().slice(0,10); }

function saveWeight() {
  const v = parseFloat(document.getElementById('w-input').value);
  if (!v || v < 20 || v > 300) return;
  weightData[todayStr()] = v;
  try { localStorage.setItem('c_weight', JSON.stringify(weightData)); } catch(e) {}
  renderWeightSection();
}

function renderWeightSection() {
  const today = todayStr();
  if (weightData[today]) document.getElementById('w-input').value = weightData[today];

  const cmp = document.getElementById('w-compare');
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  const yKey = yest.toISOString().slice(0,10);
  const yVal = weightData[yKey];
  const tVal = weightData[today];
  if (tVal && yVal) {
    const diff = (tVal - yVal).toFixed(1);
    const color = diff > 0 ? '#ef4444' : diff < 0 ? '#10b981' : '#555';
    const emoji = diff > 0 ? '📈' : diff < 0 ? '📉' : '➡️';
    cmp.innerHTML = `<span style="color:${color};font-size:15px;font-weight:700">${emoji} 前日比 ${diff>0?'+':''}${diff} kg</span>`;
  } else {
    cmp.innerHTML = tVal ? '<span style="color:#555;font-size:12px">前日のデータなし</span>' : '';
  }

  drawChart();

  const keys = Object.keys(weightData).sort().slice(-7).reverse();
  const list = document.getElementById('w-list');
  list.innerHTML = keys.map(k => {
    const d = new Date(k+'T00:00:00');
    const label = d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'});
    const val = weightData[k];
    const allKeys = Object.keys(weightData).sort();
    const prev = weightData[allKeys[allKeys.indexOf(k)-1]];
    let diffStr = '';
    if (prev) {
      const df = (val-prev).toFixed(1);
      diffStr = `<span style="font-size:11px;color:${df>0?'#ef4444':df<0?'#10b981':'#555'}">${df>0?'+':''}${df}</span>`;
    }
    const isToday = k === today;
    return `<div class="w-list-item">
      <span style="color:${isToday?'#818cf8':'#666'}">${label}${isToday?' 今日':''}</span>
      <div style="display:flex;align-items:center;gap:8px">${diffStr}<span style="font-family:monospace;font-size:14px;color:${isToday?'#818cf8':'#ccc'};font-weight:${isToday?700:400}">${val} kg</span></div>
    </div>`;
  }).join('');
}

function drawChart() {
  const canvas = document.getElementById('w-chart');
  if (!canvas) return;
  const W = canvas.offsetWidth || 320, H = 160;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const days = Array.from({length:14}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-(13-i));
    return d.toISOString().slice(0,10);
  });
  const vals = days.map(d => weightData[d] || null);
  const valid = vals.filter(v=>v!==null);
  if (valid.length === 0) {
    ctx.fillStyle='#333'; ctx.font='12px sans-serif'; ctx.textAlign='center';
    ctx.fillText('データがありません', W/2, H/2); return;
  }

  const minV = Math.min(...valid)-1, maxV = Math.max(...valid)+1;
  const pad = {t:14,b:22,l:30,r:10};
  const gW = W-pad.l-pad.r, gH = H-pad.t-pad.b;
  const xS = i => pad.l + i/13*gW;
  const yS = v => pad.t + gH - (v-minV)/(maxV-minV)*gH;

  ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=1;
  [0,1,2,3].forEach(i=>{
    const y=pad.t+i/3*gH;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#333'; ctx.font='9px monospace'; ctx.textAlign='right';
    ctx.fillText((maxV-i/3*(maxV-minV)).toFixed(1), pad.l-3, y+3);
  });

  days.forEach((d,i)=>{
    if(i%2===0){
      const dd=new Date(d+'T00:00:00');
      ctx.fillStyle='#333'; ctx.font='9px sans-serif'; ctx.textAlign='center';
      ctx.fillText(`${dd.getMonth()+1}/${dd.getDate()}`, xS(i), H-4);
    }
  });

  const pts = vals.map((v,i)=>v!==null?{x:xS(i),y:yS(v)}:null).filter(Boolean);
  if (pts.length < 1) return;

  ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x, H-pad.b);
  ctx.lineTo(pts[0].x, H-pad.b); ctx.closePath();
  ctx.fillStyle='rgba(129,140,248,0.12)'; ctx.fill();

  ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='#818cf8'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.stroke();

  const today = todayStr();
  vals.forEach((v,i)=>{
    if(!v) return;
    const isT = days[i]===today;
    ctx.beginPath(); ctx.arc(xS(i),yS(v),isT?5:3,0,Math.PI*2);
    ctx.fillStyle='#818cf8'; ctx.fill();
    if(isT){ctx.beginPath();ctx.arc(xS(i),yS(v),5,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();}
  });
}

// Favorites
let favorites = JSON.parse(localStorage.getItem('c_favs') || '[]');

function saveFavorite(entry) {
  const exists = favorites.some(f => f.input === entry.input);
  if (exists) return;
  favorites.push({input: entry.input, total: entry.total, meals: entry.meals, advice: entry.advice});
  try { localStorage.setItem('c_favs', JSON.stringify(favorites)); } catch(e) {}
}

function deleteFavorite(input) {
  favorites = favorites.filter(f => f.input !== input);
  try { localStorage.setItem('c_favs', JSON.stringify(favorites)); } catch(e) {}
  renderAll();
}

function applyFavorite(mealKey, fav) {
  mealData[mealKey].push({...fav, id: Date.now()});
  renderAll();
}

function isFavorite(input) {
  return favorites.some(f => f.input === input);
}

function toggleFav(mealKey, idx) {
  const entry = mealData[mealKey][idx];
  if (!entry) return;
  if (isFavorite(entry.input)) {
    deleteFavorite(entry.input);
  } else {
    saveFavorite(entry);
    renderAll();
  }
}

function applyAete(item, mealKey) {
  const entry = {
    input: `あえて、No.${item.id} ${item.name}`,
    meals: [{name: item.name, calories: item.calories, fat: item.fat, carbs: item.carbs, protein: item.protein, amount: '1食'}],
    total: {calories: item.calories, fat: item.fat, carbs: item.carbs, protein: item.protein},
    advice: `あえて、の栄養バランスの良いお弁当です。糖質${item.sugar||item.carbs}g・タンパク質${item.protein}gで1日の目標の約1/3をカバーします。`,
    score: 8,
    id: Date.now()
  };
  mealData[mealKey].push(entry);
  renderAll();
  closeAeteModal();
}

let aeteSearch = '';
function openAeteModal(mealKey) {
  document.getElementById('aete-meal-key').value = mealKey;
  aeteSearch = '';
  document.getElementById('aete-search').value = '';
  renderAeteList();
  document.getElementById('aete-modal').style.display = 'flex';
}
function closeAeteModal() { document.getElementById('aete-modal').style.display = 'none'; }
function renderAeteList() {
  const key = document.getElementById('aete-meal-key').value;
  const q = aeteSearch.toLowerCase();
  const filtered = q ? AETE_DB.filter(i => i.name.toLowerCase().includes(q)) : AETE_DB;
  const list = document.getElementById('aete-list');
  list.innerHTML = filtered.map(item => `
    <div onclick="applyAete(AETE_DB.find(x=>x.id===${item.id}), document.getElementById('aete-meal-key').value)"
      style="padding:12px 14px;border-bottom:1px solid #0f0f1c;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;color:#ccc;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">No.${item.id} ${item.name}</div>
        <div style="font-size:11px;color:#555;display:flex;gap:10px">
          <span style="color:#f59e0b">${item.calories}kcal</span>
          <span>脂${item.fat}g</span>
          <span>糖${item.sugar||item.carbs}g</span>
          <span>P${item.protein}g</span>
        </div>
      </div>
      <span style="color:#818cf8;font-size:18px;margin-left:10px">+</span>
    </div>
  `).join('') || '<div style="padding:20px;text-align:center;color:#555;font-size:13px">見つかりません</div>';
}

// Password for weight tab
let weightPw = localStorage.getItem('c_weightpw') || '';
let weightUnlocked = false;

function openPwModal() {
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').style.display = 'none';
  document.getElementById('pw-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}
function closePwModal() {
  document.getElementById('pw-modal').style.display = 'none';
}
function checkPw() {
  const entered = document.getElementById('pw-input').value;
  if (entered === weightPw) {
    weightUnlocked = true;
    closePwModal();
    showTab('weight');
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function startApp() {
  document.getElementById('date-label').textContent =
    new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
  renderAll();
}

// Init
loadState();
if (apiKey) {
  document.getElementById('api-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  startApp();
}
